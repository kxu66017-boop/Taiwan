services:
  - type: web
    name: taiwan-food-discovery
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      # 當未來有使用 React Router 時，此規則可將所有靜態路由重新導向 index.html
      - type: rewrite
        from: /*
        to: /index.html
